<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sentiment Analysis</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    width:500px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:#2a5298;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1e3c72;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Product Review Sentiment</h2>

<form action="/text" method="POST">

<textarea name="review" placeholder="Enter product review here..." required></textarea>

<button type="submit">Predict Sentiment</button>

</form>

{% if prediction_result %}

<div class="result">
Predicted Sentiment: {{ prediction_result }}
</div>

{% endif %}

</div>

</body>
</html>
